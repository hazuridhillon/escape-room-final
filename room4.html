<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find the Globe</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .room-container::after { pointer-events: none; }

    /* ── Toast notification ── */
    @keyframes toastDown {
      from { transform: translateX(-50%) translateY(-80px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0);     opacity: 1; }
    }
    @keyframes toastUp {
      from { transform: translateX(-50%) translateY(0);     opacity: 1; }
      to   { transform: translateX(-50%) translateY(-80px); opacity: 0; }
    }
    #toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #0D1F17;
      border: 1.5px solid var(--gold);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 12px 20px;
      z-index: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #toast.show {
      animation: toastDown 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    #toast.hide {
      animation: toastUp 0.35s ease-in forwards;
    }

    /* ── Roger statue ── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    #roger {
      position: fixed;
      width: 120px;
      cursor: grab;
      z-index: 20;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
      animation: float 2.5s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: element;
    }
    #roger.dragging {
      cursor: grabbing;
      animation-play-state: paused;
    }

    /* ── Globe drop zone ── */
    #drop-zone {
      position: absolute;
      left: 70%;
      top: 38%;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      z-index: 5;
      border: 2px dashed transparent;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    #drop-zone.drag-over {
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(242,169,0,0.5);
      background: rgba(242,169,0,0.1);
    }

    /* ── Gold particle burst ── */
    @keyframes burst {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
    .burst-particle {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      border-radius: 50%;
    }

    /* ── White flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #flash.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Instruction hint ── */
    #hint-text {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-style: italic;
      color: var(--cream);
      font-size: 0.85rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.4s;
    }
  </style>
</head>
<body>

  <!-- Timer -->
  <div class="timer" id="timer"></div>

  <!-- Toast -->
  <div id="toast">The thief's trail leads to the globe. Find it on the map.</div>

  <!-- Instruction hint -->
  <p id="hint-text">Drag Roger to the globe &mdash; he belongs there.</p>

  <!-- White flash -->
  <div id="flash"></div>

  <!-- Draggable Roger (fixed, outside .room-container) -->
  <img
    id="roger"
    src="assets/images/roger.png"
    alt="Roger Babson statue"
    draggable="true"
  />

  <div class="room-container" style="background-image: url('assets/images/map.png');">
    <!-- Globe drop zone -->
    <div id="drop-zone"></div>
  </div>

  <script src="js/game.js"></script>
  <script>
    checkAccess('room3Complete', 'room3.html');
    startTimer('timer');

    const roger    = document.getElementById('roger');
    const dropZone = document.getElementById('drop-zone');
    const flash    = document.getElementById('flash');
    const hint     = document.getElementById('hint-text');
    const toast    = document.getElementById('toast');

    // ── Randomize Roger starting position ────────────────────────────────────
    // Left third: left 5%–25%,  right third: left 72%–88%
    // Vertical middle third: top 35%–65%
    (function placeRoger() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const leftPx  = vw * (0.05 + Math.random() * 0.20); // left third only

      const topPx = vh * (0.35 + Math.random() * 0.30);

      roger.style.left = leftPx.toFixed(0) + 'px';
      roger.style.top  = topPx.toFixed(0)  + 'px';
    })();

    // ── Toast: show after 0.5 s, auto-dismiss after 3 s ──────────────────────
    setTimeout(() => {
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        toast.classList.add('hide');
      }, 3000);
    }, 500);

    // ── Drag events ───────────────────────────────────────────────────────────
    roger.addEventListener('dragstart', e => {
      roger.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', 'roger');
    });

    roger.addEventListener('dragend', () => {
      roger.classList.remove('dragging');
    });

    // ── Drop zone events ──────────────────────────────────────────────────────
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.getData('text/plain') !== 'roger') return;
      dropZone.classList.remove('drag-over');
      dropZone.style.pointerEvents = 'none';
      snapRoger();
    });

    // ── Snap Roger to globe ───────────────────────────────────────────────────
    function snapRoger() {
      const dropRect  = dropZone.getBoundingClientRect();
      const centerX   = dropRect.left + dropRect.width  / 2;
      const centerY   = dropRect.top  + dropRect.height / 2;

      // Stop float — reflow so transform resets
      roger.style.animation = 'none';
      void roger.offsetHeight;

      // Re-anchor at current visual position using top/left
      const rogerRect  = roger.getBoundingClientRect();
      roger.style.top  = rogerRect.top  + 'px';
      roger.style.left = rogerRect.left + 'px';
      void roger.offsetHeight;

      // Smooth snap to drop zone center
      roger.style.transition = 'top 0.4s ease, left 0.4s ease';
      roger.style.left = (centerX - rogerRect.width  / 2) + 'px';
      roger.style.top  = (centerY - rogerRect.height / 2) + 'px';

      hint.style.opacity = '0';

      // Gold particle burst from globe center
      spawnBurst(centerX, centerY);

      // Gold glow on Roger
      setTimeout(() => {
        roger.style.transition += ', filter 0.4s ease';
        roger.style.filter = 'drop-shadow(0 0 20px rgba(242,169,0,0.8))';
      }, 500);

      // White flash
      setTimeout(() => {
        flash.classList.add('active');
      }, 1500);

      // Redirect
      setTimeout(() => {
        setProgress('restoreComplete', 'true');
        window.location.href = 'win.html';
      }, 2000);
    }

    // ── Gold particle burst ───────────────────────────────────────────────────
    function spawnBurst(cx, cy) {
      const colors = ['#F2A900','#ffd000','#ffc82c','#ffeb80','#fff3c0','#ffffff'];
      for (let i = 0; i < 20; i++) {
        const el    = document.createElement('div');
        const size  = (5 + Math.random() * 7).toFixed(1);
        const angle = (Math.PI * 2 / 20) * i + Math.random() * 0.4;
        const dist  = 40 + Math.random() * 70;
        const dur   = (0.5 + Math.random() * 0.5).toFixed(2);
        const del   = (Math.random() * 0.2).toFixed(2);

        el.className = 'burst-particle';
        el.style.cssText = [
          `width:${size}px`,
          `height:${size}px`,
          `background:${colors[Math.floor(Math.random() * colors.length)]}`,
          `left:${cx}px`,
          `top:${cy}px`,
          `--tx:${(Math.cos(angle) * dist).toFixed(1)}px`,
          `--ty:${(Math.sin(angle) * dist).toFixed(1)}px`,
          `animation:burst ${dur}s ${del}s ease-out forwards`,
        ].join(';');

        document.body.appendChild(el);
        setTimeout(() => el.remove(), (parseFloat(dur) + parseFloat(del) + 0.1) * 1000);
      }
    }
  </script>
</body>
</html>
