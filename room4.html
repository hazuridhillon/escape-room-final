<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restore the Statue</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .room-container::after { pointer-events: none; }

    /* ── Floating statue ── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    #roger {
      position: fixed;
      bottom: 80px;
      left: 60px;
      width: 160px;
      cursor: grab;
      z-index: 20;
      filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.5));
      animation: float 3s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: element;
    }
    #roger.dragging {
      cursor: grabbing;
      animation-play-state: paused;
    }

    /* ── Drop zone ── */
    #drop-zone {
      position: absolute;
      left: 48%;
      top: 72%;
      width: 120px;
      height: 80px;
      z-index: 5;
      border-radius: 4px;
      transition: box-shadow 0.2s ease;
    }
    #drop-zone.drag-over {
      box-shadow: 0 0 20px rgba(242, 169, 0, 0.6);
    }

    /* ── Confetti burst ── */
    @keyframes burst {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
    .burst-particle {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      border-radius: 50%;
    }

    /* ── White flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #flash.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Instruction hint ── */
    #hint-text {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-style: italic;
      color: var(--cream);
      font-size: 0.85rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.4s;
    }
  </style>
</head>
<body>

  <!-- Instruction hint -->
  <p id="hint-text">Drag Roger back to where he belongs.</p>

  <!-- White flash -->
  <div id="flash"></div>

  <!-- Draggable Roger statue (lives outside .room-container so it's position:fixed) -->
  <img
    id="roger"
    src="assets/images/roger.png"
    alt="Roger Babson statue"
    draggable="true"
  />

  <div class="room-container" style="background-image: url('assets/images/globenostatue.png');">

    <!-- Invisible drop zone over the empty pedestal -->
    <div id="drop-zone"></div>

  </div>

  <script src="js/game.js"></script>
  <script>
    checkAccess('room3Complete', 'room3.html');

    const roger    = document.getElementById('roger');
    const dropZone = document.getElementById('drop-zone');
    const flash    = document.getElementById('flash');
    const hint     = document.getElementById('hint-text');

    // ── Drag events on the statue ─────────────────────────────────────────────

    roger.addEventListener('dragstart', e => {
      roger.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', 'roger');
    });

    roger.addEventListener('dragend', () => {
      roger.classList.remove('dragging');
    });

    // ── Drop zone events ──────────────────────────────────────────────────────

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.getData('text/plain') !== 'roger') return;
      dropZone.classList.remove('drag-over');
      dropZone.style.pointerEvents = 'none';
      snapRogerToPedestal();
    });

    // ── Snap Roger to pedestal ────────────────────────────────────────────────

    function snapRogerToPedestal() {
      const dropRect = dropZone.getBoundingClientRect();

      // 1. Remove the float animation so transform resets to none
      roger.style.animation = 'none';
      void roger.offsetHeight; // force reflow — transform is now 0

      // 2. Switch to top-based positioning at the current visual location
      const rogerRect = roger.getBoundingClientRect();
      roger.style.top    = rogerRect.top  + 'px';
      roger.style.left   = rogerRect.left + 'px';
      roger.style.bottom = 'auto';
      void roger.offsetHeight; // settle the new position

      // 3. Add transition and snap to pedestal
      roger.style.transition = 'top 0.55s cubic-bezier(0.22, 1, 0.36, 1), left 0.55s cubic-bezier(0.22, 1, 0.36, 1)';

      const targetLeft = dropRect.left + dropRect.width  / 2 - rogerRect.width  / 2;
      const targetTop  = dropRect.top  - rogerRect.height * 0.6; // sit above pedestal

      roger.style.left = targetLeft + 'px';
      roger.style.top  = targetTop  + 'px';

      // Hide hint
      hint.style.opacity = '0';

      // Burst confetti from pedestal center
      spawnBurst(
        dropRect.left + dropRect.width  / 2,
        dropRect.top  + dropRect.height / 2
      );

      // Fade statue out after it lands
      setTimeout(() => {
        roger.style.transition = 'opacity 0.6s ease';
        roger.style.opacity    = '0';
      }, 800);

      // White flash — no display toggle needed, transition always fires
      setTimeout(() => {
        flash.classList.add('active');
      }, 1500);

      // Redirect after flash is fully opaque
      setTimeout(() => {
        setProgress('restoreComplete', 'true');
        window.location.href = 'win.html';
      }, 2000);
    }

    // ── Gold confetti burst ───────────────────────────────────────────────────

    function spawnBurst(cx, cy) {
      const colors = ['#F2A900', '#ffd000', '#ffc82c', '#ffeb80', '#fff3c0', '#ffffff'];
      for (let i = 0; i < 30; i++) {
        const el    = document.createElement('div');
        const size  = (6 + Math.random() * 8).toFixed(1);
        const angle = (Math.PI * 2 / 30) * i + Math.random() * 0.4; // even spread + jitter
        const dist  = 55 + Math.random() * 90;
        const dur   = (0.5 + Math.random() * 0.6).toFixed(2);
        const del   = (Math.random() * 0.25).toFixed(2);

        el.className = 'burst-particle';
        el.style.cssText = [
          `width:${size}px`,
          `height:${size}px`,
          `background:${colors[Math.floor(Math.random() * colors.length)]}`,
          `left:${cx}px`,
          `top:${cy}px`,
          `--tx:${(Math.cos(angle) * dist).toFixed(1)}px`,
          `--ty:${(Math.sin(angle) * dist).toFixed(1)}px`,
          `animation:burst ${dur}s ${del}s ease-out forwards`,
        ].join(';');

        document.body.appendChild(el);
        setTimeout(() => el.remove(), (parseFloat(dur) + parseFloat(del) + 0.1) * 1000);
      }
    }
  </script>
</body>
</html>
